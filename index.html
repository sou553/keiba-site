<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>予想整理サイト</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header sticky-top">
      <div class="site-header__inner page-width">
        <a class="site-logo" href="./index.html" aria-label="ホーム">
          <span class="site-logo__mark">競</span>
          <span class="site-logo__text">予想整理サイト</span>
        </a>
      </div>
    </header>

    <main class="page-width page-main">
      <section class="hero-panel">
        <div class="hero-panel__head">
          <h1 class="page-title">レース一覧</h1>
          <p class="page-subtitle">一覧性を優先して、スマホでも上から読みやすい形に整理。</p>
        </div>

        <div id="date-tabs" class="date-tabs" aria-label="日付一覧"></div>

        <div class="filter-panel">
          <div class="filter-grid">
            <label class="field-block field-block--grow">
              <span class="field-label">キーワード</span>
              <input id="keyword-input" class="field-input" type="text" placeholder="レース名・競馬場・AI1位名">
            </label>

            <label class="field-block field-block--compact">
              <span class="field-label">競馬場</span>
              <select id="place-select" class="field-select">
                <option value="">すべて</option>
              </select>
            </label>
          </div>

          <div class="filter-actions">
            <label class="check-chip">
              <input id="odds-only-check" type="checkbox">
              <span>単勝オッズあり</span>
            </label>
            <button id="clear-filter-btn" class="btn btn--ghost" type="button">絞り込み解除</button>
          </div>
        </div>
      </section>

      <section class="content-panel">
        <div class="section-heading">
          <div>
            <h2 class="section-title">レース一覧</h2>
            <p id="list-meta" class="section-note">読み込み中...</p>
          </div>
        </div>
        <div id="race-list" class="race-list"></div>
      </section>
    </main>
  </div>

  <script src="./static/index.js"></script>
</body>
</html>
