<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>予想整理サイト</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body data-data-root="./data">
  <header class="nk-site-header">
    <div class="nk-site-logo">競</div>
    <div class="nk-site-title">予想整理サイト</div>
  </header>

  <main class="nk-page-wrap">
    <section class="nk-section">
      <h1 class="nk-big-title">レース一覧</h1>
      <div class="nk-section-sub">一覧性を優先して、スマホでも上から読みやすい形に整理。</div>
      <div id="date-tabs" class="nk-date-tabs"></div>
      <div class="nk-filter-box">
        <div class="nk-filter-grid">
          <label class="nk-field"><span>キーワード</span><input id="filter-keyword" type="text" placeholder="レース名・競馬場・AI1位名"></label>
          <label class="nk-field nk-field-small"><span>競馬場</span><select id="filter-course"><option value="">すべて</option></select></label>
        </div>
        <div class="nk-filter-actions">
          <label class="nk-check"><input id="filter-odds-only" type="checkbox"> 単勝オッズあり</label>
          <button id="filter-reset" type="button" class="nk-action-btn">絞り込み解除</button>
        </div>
      </div>
    </section>

    <section class="nk-section">
      <h2 class="nk-big-title nk-big-title-sm">レース一覧</h2>
      <div id="race-list-meta" class="nk-list-meta">-</div>
      <div id="race-list"></div>
    </section>
  </main>

  <script src="./static/analysis_common.js"></script>
  <script src="./static/index.js"></script>
</body>
</html>
