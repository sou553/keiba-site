<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予想整理サイト</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
  <header class="nk-topbar">
    <div class="nk-shell">
      <div class="nk-brand">
        <div class="nk-brand-logo">競</div>
        <div class="nk-brand-title">予想整理サイト</div>
      </div>
      <div class="nk-date-tabs" id="date-tabs"></div>
    </div>
  </header>

  <main class="nk-shell nk-stack">
    <section class="nk-card nk-section">
      <h2 class="nk-section-title">絞り込み</h2>
      <p class="nk-section-sub">一覧性を優先して、スマホでも上から読みやすい形に整理。</p>
      <div class="nk-filter-bar" style="margin-top:12px">
        <label class="nk-field" style="flex:1 1 320px">
          <span class="nk-label">キーワード</span>
          <input class="nk-input" id="search-input" placeholder="レース名・競馬場・AI1位名">
        </label>
        <label class="nk-field" style="width:140px">
          <span class="nk-label">競馬場</span>
          <select class="nk-select" id="course-filter">
            <option value="">すべて</option>
          </select>
        </label>
        <label class="nk-check"><input type="checkbox" id="odds-only"> 単勝オッズあり</label>
        <button class="nk-btn" id="reset-filter">絞り込み解除</button>
      </div>
    </section>

    <section class="nk-card nk-section">
      <h2 class="nk-section-title">レース一覧</h2>
      <p class="nk-section-sub" id="list-caption">読み込み中...</p>
      <div class="nk-race-list" id="race-list" style="margin-top:12px"></div>
    </section>
  </main>
  <script src="./static/index.js"></script>
</body>
</html>
