<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f3ea">
  <title>騎手一覧 | 予想整理サイト</title>
  <meta name="description" content="開催日ごとの騎手別 当日騎乗一覧">
  <link rel="icon" type="image/png" href="./S_firebase_mini.png">
  <link rel="stylesheet" href="./static/style.css">
</head>
<body data-data-root="./data" data-index-page="index.html" data-race-page="race_detail.html" data-past-page="past_detail.html" data-betting-page="betting.html" data-jockeys-page="jockeys.html">
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="./index.html" aria-label="トップへ戻る">
          <span class="site-brand__icon">競</span>
          <span class="site-brand__texts">
            <strong class="site-brand__title">予想整理サイト</strong>
            <span class="site-brand__sub">予想まとめ / netkeiba寄せ / スマホ重視</span>
          </span>
        </a>
        <div class="site-header__actions">
          <a class="action-link" href="./jockeys.html">騎手一覧</a>
        </div>
      </div>
    </header>

    <main class="page page--jockeys">
      <div id="jockeys-app" class="jockeys-app">
    <header class="jockey-page-head">
      <div class="jockey-page-head__top">
        <div class="jockey-page-head__titlebox">
          <div class="badge badge--blue">騎手一覧</div>
          <h1>騎手別 当日騎乗一覧</h1>
          <div class="jockey-page-head__sub">その日の全レースを騎手ごとに再集約して表示</div>
        </div>
      </div>

      <section id="jockey-date-strip" class="jockey-date-strip" aria-label="開催日切替"></section>

      <section class="jockey-toolbar" aria-label="フィルタ">
        <div class="jockey-toolbar__group">
          <input id="jockey-keyword" type="search" placeholder="騎手名・馬名で検索" />
          <select id="course-filter">
            <option value="">全会場</option>
          </select>
        </div>

        <div class="jockey-toolbar__group">
          <label><input type="checkbox" id="only-popular-rides"> 人気上位騎乗あり</label>
          <label><input type="checkbox" id="only-single-digit-odds"> 1桁オッズあり</label>
          <label><input type="checkbox" id="only-value-rides"> 穴候補あり</label>
        </div>

        <div class="jockey-toolbar__group">
          <select id="sort-select" aria-label="並び順">
            <option value="ride_count">騎乗数順</option>
            <option value="best_top3">最高複勝率順</option>
            <option value="avg_top3">平均複勝率順</option>
            <option value="popular_count">人気上位騎乗数順</option>
            <option value="single_digit_count">1桁オッズ騎乗数順</option>
          </select>
        </div>
      </section>
    </header>

    <section id="jockey-overview" class="jockey-overview" aria-label="集計サマリー"></section>
    <div id="status-box" class="status-box is-info" aria-live="polite"></div>
    <section id="jockey-summary-list" class="jockey-summary-list"></section>
      </div>
    </main>
  </div>

  <script src="./static/analysis_common.js"></script>
  <script src="./static/jockeys.js"></script>
</body>
</html>
