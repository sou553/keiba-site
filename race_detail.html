<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出走馬一覧</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
<header class="nk-topbar">
  <div class="nk-shell">
    <div class="nk-brand">
      <div class="nk-brand-logo">競</div>
      <div class="nk-brand-title">予想整理サイト</div>
    </div>
    <div class="nk-page-tabs">
      <a class="nk-tab is-active" id="tab-race" href="#">出走馬一覧</a>
      <a class="nk-tab" id="tab-past" href="#">過去走比較</a>
      <a class="nk-tab" id="tab-betting" href="#">買い目作成</a>
    </div>
  </div>
</header>

<main class="nk-shell nk-stack">
  <section class="nk-card nk-section">
    <div id="race-head">読み込み中...</div>
  </section>

  <section class="nk-hero">
    <div class="nk-main-pick" id="summary-panel"></div>
    <div class="nk-summary-box nk-popular-side">
      <div class="nk-section-title">人気馬まとめ</div>
      <div id="popular-summary" class="nk-list"></div>
    </div>
  </section>

  <section class="nk-grid-2">
    <div class="nk-mini-box">
      <div class="nk-mini-title">相手本線</div>
      <div id="line-panel" class="nk-list"></div>
    </div>
    <div class="nk-mini-box">
      <div class="nk-mini-title">穴候補</div>
      <div id="hole-panel" class="nk-list"></div>
    </div>
    <div class="nk-mini-box">
      <div class="nk-mini-title">危険人気</div>
      <div id="danger-panel" class="nk-list"></div>
    </div>
    <div class="nk-mini-box">
      <div class="nk-mini-title">ひとこと / 判定理由</div>
      <div id="reason-panel" class="nk-note-list"></div>
    </div>
  </section>

  <section class="nk-card nk-section">
    <div class="nk-section-title">人気馬の乖離</div>
    <p class="nk-section-sub">人気とAI / 適性順位のズレを独立表示。乖離パネルは差5以上をシンプル表示。</p>
    <div class="nk-gap-panels" id="gap-panels" style="margin-top:12px"></div>
  </section>

  <section class="nk-card nk-section">
    <div class="nk-section-title">出走馬一覧</div>
    <p class="nk-section-sub">予想まとめは厳しめ、一覧はスマホで比較しやすいカード型。</p>
    <div class="nk-horse-list" id="horse-list" style="margin-top:12px"></div>
  </section>
</main>

<script src="./static/race.js"></script>
</body>
</html>
